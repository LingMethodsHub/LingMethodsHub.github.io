      "Authors@R": "c( person(\"Jacolien\", \"van Rij\", email=\"j.c.van.rij@rug.nl\", role = c(\"aut\", \"cre\")), person(\"Martijn\",\"Wieling\", role = \"aut\"),  person(\"R. Harald\",\"Baayen\", role = \"aut\"),  person(\"Hedderik\", \"van Rijn\", role = \"ctb\"))",
