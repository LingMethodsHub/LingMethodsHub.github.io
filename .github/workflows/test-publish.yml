name: Test Build Site
on:
  pull_request:
    branches: ["main"]
    
env:
  RENV_PATHS_ROOT: ~/.cache/R/renv
  QUARTO_PYTHON: renv/python/virtualenvs/renv-python-3.10/bin/python
jobs:
  build-docs:
     runs-on: ubuntu-latest
     steps:
      - uses: actions/checkout@v2
        with:
          submodules: 'true'
      # - name: Install dependencies
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install libudunits2-dev libnode-dev libproj-dev      
      - uses: r-lib/actions/setup-r@v2
      - name: Cache packages
        uses: actions/cache@v4
        with:
          path: ${{ env.RENV_PATHS_ROOT }}
          key: ${{ runner.os }}-renv-${{ hashFiles('**/renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-renv-          
      - name: Setup Dependencies
        shell: Rscript {0}
        run: |
          if (!requireNamespace("renv", quietly = TRUE)) install.packages("renv")
          renv::install("mdneuzerling/getsysreqs")
          renv::install("reticulate")
          reticulate::install_python("3.10:latest")
          renv::use_python(type = "virtualenv")
      - name: install dependencies
        run: |
          sysreqs=$(Rscript .github/get_sys_reqs.R)
          sudo apt-get update
          sudo eval "$sysreqs"
      
      - name: Install Packages
        shell: Rscript {0}
        run: |      
          renv::restore()
      - name: Set up quarto
        uses: quarto-dev/quarto-actions/setup@v2
      # - name: Set Quarto Python
      #   run: |
      #     echo "QUARTO_PYTHON=renv/python/virtualenvs/renv-python-3.9/bin/python" >> $GITHUB_ENV
      - name: Test Render
        uses: quarto-dev/quarto-actions/render@v2