name: Test Build Site
on:
  pull_request:
    branches: ["main"]
    
env:
  RENV_PATHS_ROOT: ~/.cache/R/renv
  QUARTO_PYTHON: renv/python/virtualenvs/renv-python-3.10/bin/python
jobs:
  build-docs:
     runs-on: ubuntu-latest
     steps:
      - uses: actions/checkout@v2
        with:
          submodules: 'true'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y --no-install-recommends install libnode-dev \
          libx11-dev git libcurl4-openssl-dev libssl-dev cmake make \
          libuv1-dev libgit2-dev zlib1g-dev libjpeg-dev pandoc libpng-dev \
          libfreetype6-dev libtiff-dev libwebp-dev libgdal-dev gdal-bin \
          libgeos-dev libproj-dev libsqlite3-dev libicu-dev libfontconfig1-dev \
          libfribidi-dev libharfbuzz-dev libudunits2-dev libxml2-dev     
      - uses: r-lib/actions/setup-r@v2
      - name: Cache packages
        uses: actions/cache@v4
        with:
          path: ${{ env.RENV_PATHS_ROOT }}
          key: ${{ runner.os }}-renv-${{ hashFiles('**/renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-renv-          
      - name: Setup Dependencies
        shell: Rscript {0}
        run: |
          if (!requireNamespace("renv", quietly = TRUE)) install.packages("renv")
          renv::install("mdneuzerling/getsysreqs")
          renv::install("reticulate")
          reticulate::install_python("3.10:latest")
          renv::use_python(type = "virtualenv")
      - name: Install Packages
        shell: Rscript {0}
        run: |      
          renv::restore()
      - name: Set up quarto
        uses: quarto-dev/quarto-actions/setup@v2
      # - name: Set Quarto Python
      #   run: |
      #     echo "QUARTO_PYTHON=renv/python/virtualenvs/renv-python-3.9/bin/python" >> $GITHUB_ENV
      - name: Install Google Fonts
        run: |
          mv assets/Charis_SIL /usr/share/fonts/
          mv assets/monaco /usr/share/fonts/
          fc-cache -fv      
      - name: Test Render
        uses: quarto-dev/quarto-actions/render@v2